<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - BLACKSAUCE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: #00ff41;
        }
        .nav {
            background: rgba(0, 0, 0, 0.9);
            padding: 20px 40px;
            border-bottom: 2px solid #00ff41;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav h1 { font-size: 1.5em; }
        .nav a { color: #00ff41; text-decoration: none; margin-left: 20px; }
        .container {
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff41;
            padding: 30px;
            text-align: center;
        }
        .stat-card h2 { font-size: 2.5em; margin-bottom: 10px; }
        .stat-card p { color: #888; }
        
        .section {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff41;
            margin-bottom: 30px;
        }
        .section-header {
            padding: 20px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .section-header h2 { font-size: 1.3em; }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th { background: rgba(0, 255, 65, 0.1); color: #00ff41; }
        tr:hover { background: rgba(0, 255, 65, 0.05); }
        
        .btn {
            background: transparent;
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 5px 15px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }
        .btn:hover { background: #ff4444; color: #000; }
        
        .tabs {
            display: flex;
            border-bottom: 1px solid #333;
        }
        .tab {
            padding: 15px 30px;
            cursor: pointer;
            border: none;
            background: transparent;
            color: #888;
            font-family: 'Courier New', monospace;
            font-size: 1em;
        }
        .tab.active {
            color: #00ff41;
            border-bottom: 2px solid #00ff41;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .alert {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4444;
            padding: 10px 15px;
            margin: 10px 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="nav">
        <h1>BLACKSAUCE - Admin Panel</h1>
        <div>
            <a href="/dashboard">Dashboard</a>
            <a href="/logout">Logout</a>
        </div>
    </div>
    
    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <h2 id="userCount">{{.userCount}}</h2>
                <p>Total Users</p>
            </div>
            <div class="stat-card">
                <h2 id="activityCount">{{.activityCount}}</h2>
                <p>Activities Logged</p>
            </div>
            <div class="stat-card">
                <h2 id="codeCount">{{.codeCount}}</h2>
                <p>Code Executions</p>
            </div>
        </div>
        
        <div id="alerts"></div>
        
        <div class="section">
            <div class="tabs">
                <button class="tab active" onclick="showTab('users')">Users</button>
                <button class="tab" onclick="showTab('activities')">Activities</button>
                <button class="tab" onclick="showTab('codes')">Code Executions</button>
            </div>
            
            <div id="users" class="tab-content active">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Type</th>
                            <th>Created</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="userTable"></tbody>
                </table>
            </div>
            
            <div id="activities" class="tab-content">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Action</th>
                            <th>Details</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="activityTable"></tbody>
                </table>
            </div>
            
            <div id="codes" class="tab-content">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Code (preview)</th>
                            <th>Output</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="codeTable"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`[onclick="showTab('${tab}')"]`).classList.add('active');
            document.getElementById(tab).classList.add('active');
        }
        
        function loadData() {
            fetch('/admin/users')
                .then(r => r.json())
                .then(data => {
                    const tbody = document.getElementById('userTable');
                    tbody.innerHTML = '';
                    for (let key in data) {
                        const u = data[key];
                        tbody.innerHTML += `<tr>
                            <td>${u.id}</td>
                            <td>${u.username}</td>
                            <td>${u.isAdmin ? 'Admin' : 'User'}</td>
                            <td>${new Date(u.createdAt).toLocaleString()}</td>
                            <td>${!u.isAdmin ? `<button class="btn" onclick="deleteUser('${u.username}')">Delete</button>` : '-'}</td>
                        </tr>`;
                    }
                });
            
            fetch('/admin/activities')
                .then(r => r.json())
                .then(data => {
                    const tbody = document.getElementById('activityTable');
                    tbody.innerHTML = '';
                    const alerts = [];
                    data.slice().reverse().slice(0, 20).forEach(a => {
                        if (a.action.includes('paste') || a.action.includes('tab') || a.action.includes('blur') || a.action.includes('bulk')) {
                            alerts.push(a);
                        }
                        tbody.innerHTML += `<tr>
                            <td>${a.id}</td>
                            <td>${a.username}</td>
                            <td style="color: ${a.action.includes('paste') || a.action.includes('tab') || a.action.includes('blur') || a.action.includes('bulk') ? '#ff4444' : '#00ff41'}">${a.action}</td>
                            <td>${a.details || '-'}</td>
                            <td>${new Date(a.timestamp).toLocaleString()}</td>
                        </tr>`;
                    });
                    
                    if (alerts.length > 0) {
                        const alertDiv = document.getElementById('alerts');
                        alertDiv.innerHTML = `<div class="alert" style="display:block">
                            <strong>⚠️ ${alerts.length} suspicious activities detected!</strong><br>
                            ${alerts.slice(0, 3).map(a => `${a.username}: ${a.action} - ${a.details}`).join('<br>')}
                        </div>`;
                    }
                });
            
            fetch('/admin/codes')
                .then(r => r.json())
                .then(data => {
                    const tbody = document.getElementById('codeTable');
                    tbody.innerHTML = '';
                    data.slice().reverse().slice(0, 20).forEach(c => {
                        tbody.innerHTML += `<tr>
                            <td>${c.id}</td>
                            <td>${c.username}</td>
                            <td>${c.code.substring(0, 50)}...</td>
                            <td>${c.error ? '<span style="color:#ff4444">Error</span>' : c.output.substring(0, 50) + '...'}</td>
                            <td>${new Date(c.timestamp).toLocaleString()}</td>
                        </tr>`;
                    });
                });
        }
        
        function deleteUser(username) {
            if (confirm('Delete user ' + username + '?')) {
                fetch('/admin/user/delete', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: 'username=' + username
                }).then(() => loadData());
            }
        }
        
        setInterval(loadData, 5000);
        loadData();
    </script>
</body>
</html>
